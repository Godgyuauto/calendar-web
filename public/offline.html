<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 상태</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #1e293b;
        font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }
      main {
        width: min(480px, 90vw);
        border: 1px solid #cbd5e1;
        background: #ffffff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }
      p {
        margin: 0;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다</h1>
      <p>네트워크 연결이 복구되면 최신 가족 일정과 오버라이드가 자동으로 반영됩니다.</p>
    </main>
  </body>
</html>
